---
# Register + install + start ONE staged runner. Mirror of vps/register-runner.sh.
# Requires (pass on the CLI):
#   ansible-playbook site.yml --tags register \
#     -e runner_index=1 -e "runner_token=$(pbpaste)"
#
# runner_token is a SHORT-LIVED org registration token (not a PAT), from
# https://github.com/organizations/{{ runner_org }}/settings/actions/runners/new
#
# SECURITY: re-registering a runner that has already run untrusted (fork-PR) jobs
# is unsafe — those jobs can write the tree this play then touches as root. Only
# register fresh/trusted runners, or move to ephemeral runners for untrusted work.

- name: Validate inputs
  ansible.builtin.assert:
    that:
      - runner_index is defined
      - runner_token is defined
      - runner_token | default('') | length > 0
    fail_msg: "Pass -e runner_index=<N> and -e runner_token=<short-lived token>"

- name: Derive facts
  ansible.builtin.set_fact:
    r_user: "{{ runner_user_prefix }}-{{ runner_index }}"
    r_name: "{{ runner_name_prefix }}-{{ runner_index }}"
    r_run_dir: "/home/{{ runner_user_prefix }}-{{ runner_index }}/actions-runner"

- name: Ensure the runner is staged
  ansible.builtin.stat:
    path: "{{ r_run_dir }}/config.sh"
  register: r_cfg
- name: Fail if not staged
  ansible.builtin.fail:
    msg: "runner {{ runner_index }} is not staged — run the stage_runners role first"
  when: not r_cfg.stat.exists

# Re-register safety: skip (re)configuration once the service unit exists.
- name: Check whether the runner service is already installed
  ansible.builtin.stat:
    path: "/etc/systemd/system/actions.runner.{{ runner_org }}.{{ r_name }}.service"
  register: r_service_stat

# Idempotency + partial-failure RECOVERY: gate config on config.sh's OWN
# precondition — the presence of the `.runner` marker it writes. config.sh refuses
# ("already configured, run './config.sh remove' first") if `.runner` exists, so
# re-running it always fails once the runner is configured — even with --replace,
# which only resolves a server-side NAME collision, not a local reconfigure. Gating
# on `.runner` (not the service) means a run that configured the runner but then
# died before installing the service RECOVERS on re-run: config is skipped and the
# install block below (gated on service absence) finishes the job. To force a full
# re-register, run `./config.sh remove` (clears `.runner`) AND remove the service.
- name: Check whether the runner is already configured
  ansible.builtin.stat:
    path: "{{ r_run_dir }}/.runner"
  register: r_runner_cfg

# Token goes via the ENVIRONMENT and is referenced as $RUNNER_TOKEN in the command,
# so it never lands in argv / /proc/<pid>/cmdline (visible to the other runner
# users' jobs). no_log keeps it out of Ansible output. HOME is set explicitly:
# become_user does NOT reset HOME (it stays /root), so config.sh/dotnet would try
# to write dotfiles under /root and hit EACCES as the unprivileged user.
- name: Configure the runner
  become: true
  become_user: "{{ r_user }}"
  ansible.builtin.shell:
    chdir: "{{ r_run_dir }}"
    cmd: >-
      ./config.sh --url "{{ runner_url }}" --token "$RUNNER_TOKEN"
      --name "{{ r_name }}" --labels "{{ runner_labels }}"
      --work _work --unattended --replace
  environment:
    RUNNER_TOKEN: "{{ runner_token }}"
    HOME: "/home/{{ r_user }}"
  no_log: true
  register: r_configure
  changed_when: "'Settings Saved' in r_configure.stdout or 'successfully' in r_configure.stdout"
  when: not r_runner_cfg.stat.exists

# Install the service with the runner tree ROOT-OWNED, to NARROW (not fully close)
# the TOCTOU window before `svc.sh install` runs it as root: once the tree is
# root:root, a concurrent job running as {{ r_user }} can no longer swap svc.sh or
# the bin/ helpers out from under the install. The residual window (config.sh
# writing svc.sh as the user -> this chown) matches vps/register-runner.sh's
# partial coverage.
#
# NOTE: svc.sh is NOT a tarball member — config.sh GENERATES it from the immutable
# ./bin/systemd.svc.sh.template with the service name substituted in, so there is
# nothing to "re-extract pristine" (an earlier version tried and always failed:
# `include: ./svc.sh` matches no member). Root-owning the tree is the mitigation.
#
# Both chowns EXCLUDE _work. svc.sh install only reads the runner scripts/binaries
# (svc.sh, bin/, templates) — never _work — so root-owning _work is pure downside:
# it would be slow on a re-register with a populated _work, and it would flatten the
# subuid/subgid ownership of files that rootless-podman container jobs wrote there
# (100000+), breaking later jobs. At first registration _work doesn't exist yet
# anyway. The `always` restore runs even on failure so the service can run as the
# user. (find -maxdepth 1 -exec chown -R excludes just the top-level _work dir.)
- name: Install the runner service (hardened)
  when: not r_service_stat.stat.exists
  block:
    - name: Root-own the runner tree except _work (narrow the TOCTOU window)
      ansible.builtin.command:
        chdir: "{{ r_run_dir }}"
        argv:
          - find
          - .
          - -mindepth
          - "1"
          - -maxdepth
          - "1"
          - "!"
          - -name
          - _work
          - -exec
          - chown
          - -R
          - "root:root"
          - "{}"
          - +
      changed_when: true
    - name: Install the service (root-owned tree)
      ansible.builtin.command:
        chdir: "{{ r_run_dir }}"
        cmd: "./svc.sh install {{ r_user }}"
  always:
    - name: Restore runner-tree ownership to the runner user except _work
      ansible.builtin.command:
        chdir: "{{ r_run_dir }}"
        argv:
          - find
          - .
          - -mindepth
          - "1"
          - -maxdepth
          - "1"
          - "!"
          - -name
          - _work
          - -exec
          - chown
          - -R
          - "{{ r_user }}:{{ r_user }}"
          - "{}"
          - +
      changed_when: true

- name: Reload systemd (bind the pre-staged resource drop-in)
  ansible.builtin.systemd:
    daemon_reload: true

- name: Enable + start the runner service
  ansible.builtin.systemd:
    name: "actions.runner.{{ runner_org }}.{{ r_name }}.service"
    enabled: true
    state: started

- name: Show applied caps
  ansible.builtin.command:
    cmd: >-
      systemctl show actions.runner.{{ runner_org }}.{{ r_name }}.service
      -p MemoryMax -p MemorySwapMax -p Slice
  changed_when: false
  register: r_caps
- name: Report
  ansible.builtin.debug:
    msg: "{{ r_name }} registered. {{ r_caps.stdout_lines }}"
