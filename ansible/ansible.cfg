# Ansible config for the vymalo VPS runner host.
# Run everything from this directory: `cd ansible && ansible-playbook site.yml`.
[defaults]
inventory = inventory.ini
roles_path = roles
host_key_checking = True
retry_files_enabled = False
stdout_callback = yaml
# Show a per-task diff of what would change; pairs with --check for drift detection.
# (Override on the CLI with --diff / --check as needed.)

[ssh_connection]
pipelining = True
