# The vymalo self-hosted runner host(s). The same roles provision each host
# identically; per-host sizing lives in host_vars/<name>.yml (group_vars/all.yml
# holds the shared defaults, tuned for the primary 31 GiB box).
#
# SSH hardening is deliberately deferred (root login still enabled) — see
# vps/README.md.
#
# HOST ADDRESSES ARE INTENTIONALLY NOT STORED IN GIT. `ansible_host` below is an
# SSH-config alias, not a hostname/IP — define each in your ~/.ssh/config, e.g.:
#     Host vymalo-runner-1
#         HostName <address of the primary host>
#         User root
#     Host vymalo-runner-2
#         HostName <address of the secondary host>
#         User root
# (or point the aliases at a DNS name once that lands). Keep addresses out of the
# repo, PRs, and commit messages.
#
# When onboarding a NEW host, --limit it so you don't touch the others:
#   ansible-playbook site.yml --limit vps-runners-2 --check --diff
[runner_hosts]
# Primary: 12 vCPU / 31 GiB. 2 runners; caps from group_vars/all.yml.
vps-runners   ansible_host=vymalo-runner-1 ansible_user=root
# Secondary: 8 vCPU / 15 GiB. 1 larger runner; caps in host_vars/vps-runners-2.yml.
vps-runners-2 ansible_host=vymalo-runner-2 ansible_user=root

[runner_hosts:vars]
ansible_python_interpreter=/usr/bin/python3
