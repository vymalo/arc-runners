# The vymalo self-hosted runner host(s). Single box today; add more under
# [runner_hosts] and the same roles provision each identically.
#
# SSH hardening is deliberately deferred (root login still enabled) — see
# vps/README.md. Swap ansible_host for a DNS name once that lands.
[runner_hosts]
vps-runners ansible_host=REDACTED_HOST_ADDR ansible_user=root

[runner_hosts:vars]
ansible_python_interpreter=/usr/bin/python3
