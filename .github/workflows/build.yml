name: Build arc-runners image

# Builds and publishes the self-hosted GitHub Actions runner image
# (ghcr.io/vymalo/arc-runners).
#
# Runs on GitHub-hosted runners on purpose: this repo BOOTSTRAPS the runner
# image, so it must not depend on a self-hosted runner of its own kind. The
# cold build downloads/compiles a large toolchain (Rust + Flutter + Android
# SDK + Node + Ruby + ops tools), so we free disk first and allow generous
# time; a registry-backed buildx cache keeps warm rebuilds fast without
# hitting the 10 GB GitHub Actions cache ceiling.
#
# Safety:
#   - Pull requests BUILD but never PUSH (validate Dockerfile changes safely).
#   - Publishes are gated to `main` and `v*` tags only.
#   - Minimal permissions; GITHUB_TOKEN is mounted as a build secret for
#     cargo-binstall's rate limit and is never baked into a layer.
#
# Matrix: fans out over JAVA_VERSION x NODE major and publishes one image per
# combo as `:jdk<java>-node<major>`. Currently Java 21 x Node {22,24} (two
# images); the JAVA axis is kept matrix-shaped so a JDK 25 leg can be re-added
# in one line once validated. The canonical jdk21-node24 combo is also published
# as the moving `:latest` and `:<sha7>` tags. amd64-only.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/build.yml
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - .github/workflows/build.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: vymalo/arc-runners

jobs:
  build-and-push:
    name: Build jdk${{ matrix.java }}-node${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    # Per-combo concurrency so the four matrix legs don't serialize against
    # each other (cancel-in-progress stays off — a publish shouldn't be killed).
    concurrency:
      group: build-${{ github.ref }}-jdk${{ matrix.java }}-node${{ matrix.node }}
      cancel-in-progress: false

    strategy:
      fail-fast: false
      matrix:
        # Java 21 only for now — it's inside every current Gradle/AGP support
        # window, so Android builds are safe. Add '25' here (and validate it
        # against the consuming repo's Gradle/AGP pins) to ship a JDK 25 leg.
        java: ['21']
        node: ['22', '24']
        # Map each Node major to the full pinned x.y.z passed as NODE_VERSION.
        # Re-resolve the patch from nodejs.org/dist when bumping.
        include:
          - node: '22'
            node_version: '22.23.1'
          - node: '24'
            node_version: '24.18.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free up disk space
        run: |
          # The image bakes a multi-GB toolchain; the hosted runner's ~14 GB
          # free root disk isn't enough alongside the build cache. Everything
          # is built INSIDE the container, so dropping the big preinstalled
          # host SDKs is safe and buys ~25-40 GB.
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Compute tags + cache ref
        id: meta
        env:
          JAVA: ${{ matrix.java }}
          NODE: ${{ matrix.node }}
        run: |
          sha7="$(printf '%s' "${GITHUB_SHA}" | cut -c1-7)"
          base="${REGISTRY}/${IMAGE_NAME}"
          combo="jdk${JAVA}-node${NODE}"

          # Every combo gets a moving combo tag + an immutable per-commit tag.
          tags="${base}:${combo}"$'\n'"${base}:${combo}-${sha7}"
          # The canonical combo additionally moves :latest and :<sha7>.
          if [ "${JAVA}" = "21" ] && [ "${NODE}" = "24" ]; then
            tags="${tags}"$'\n'"${base}:latest"$'\n'"${base}:${sha7}"
          fi

          {
            echo "tags<<EOF"; echo "$tags"; echo "EOF";
            echo "cache=${base}:buildcache-${combo}";
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            JAVA_VERSION=${{ matrix.java }}
            NODE_VERSION=${{ matrix.node_version }}
          # Publish only from main / tags; PRs and dispatched non-main refs
          # build through buildx but ship nothing.
          push: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
          provenance: false
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          # Per-combo cache ref so the four legs don't clobber each other's cache.
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache }}
          cache-to: ${{ (github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))) && format('type=registry,ref={0},mode=max', steps.meta.outputs.cache) || '' }}
